services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: odms
      POSTGRES_PASSWORD: odms
      POSTGRES_DB: odms
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  
volumes:
  pgdata: